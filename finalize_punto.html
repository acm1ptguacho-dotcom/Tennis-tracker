<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finalizar punto – Tennis Direction Tracker</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Additional styles specific to the finalisation page */
      .final-container {
        max-width: 480px;
        margin: 0 auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .final-heading {
        font-size: 1.2rem;
        font-weight: 600;
        color: #56f5f4;
        margin: 0;
      }

      .player-info {
        font-size: 0.9rem;
        color: #aab5c0;
      }

      .final-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .final-column {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        background: rgba(4, 12, 24, 0.7);
        border-radius: 0.6rem;
        border: 1px solid rgba(86, 245, 244, 0.2);
        padding: 0.6rem;
      }

      .final-column h3 {
        margin: 0 0 0.4rem;
        font-size: 0.95rem;
        font-weight: 600;
        color: #e5e8ec;
        text-align: center;
      }

      .final-button {
        padding: 0.6rem 0.4rem;
        border-radius: 0.6rem;
        font-size: 0.9rem;
        font-weight: 600;
        text-align: center;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s;
      }

      .final-button.error {
        background: linear-gradient(to right, #382649, #54306b);
        color: #f5bfd1;
        border: 1px solid rgba(245, 191, 209, 0.2);
      }

      .final-button.win {
        background: linear-gradient(to right, #0dc56c, #0ea977);
        color: #05121f;
        border: 1px solid rgba(13, 197, 108, 0.2);
      }

      .final-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(86, 245, 244, 0.25);
      }
    </style>
  </head>
  <body>
    <header class="top-bar">
      <div class="logo">Finalizar&nbsp;punto</div>
    </header>
    <div class="final-container">
      <h2 class="final-heading">Finalizar punto</h2>
      <p class="player-info">Jugador analizado: Jugador A</p>
      <div class="final-grid">
        <!-- Perdido column -->
        <div class="final-column">
          <h3>Perdido</h3>
          <div class="final-button error">Error no forzado</div>
          <div class="final-button error">Error forzado</div>
          <div class="final-button error">Dejada</div>
          <div class="final-button error">Volea</div>
        </div>
        <!-- Ganado column -->
        <div class="final-column">
          <h3>Ganado</h3>
          <div class="final-button win">Winner</div>
          <div class="final-button win">Golpe</div>
          <div class="final-button win">Dejada</div>
          <div class="final-button win">Volea</div>
        </div>
      </div>
    </div>
  </body>
</html>
